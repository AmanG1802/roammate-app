services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-roammate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-roammate}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db/roammate
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GOOGLE_MAPS_MOCK: ${GOOGLE_MAPS_MOCK:-true}
      GOOGLE_MAPS_API_VERSION: ${GOOGLE_MAPS_API_VERSION:-v1}
      GOOGLE_MAPS_FETCH_PHOTOS: ${GOOGLE_MAPS_FETCH_PHOTOS:-true}
      GOOGLE_MAPS_FETCH_RATING: ${GOOGLE_MAPS_FETCH_RATING:-true}
      APPLE_MAPS_ENABLED: ${APPLE_MAPS_ENABLED:-false}
      APPLE_MAPS_TEAM_ID: ${APPLE_MAPS_TEAM_ID}
      APPLE_MAPS_KEY_ID: ${APPLE_MAPS_KEY_ID}
      APPLE_MAPS_PRIVATE_KEY_PATH: ${APPLE_MAPS_PRIVATE_KEY_PATH}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_OAUTH_CLIENT_ID_WEB: ${GOOGLE_OAUTH_CLIENT_ID_WEB}
      GOOGLE_OAUTH_CLIENT_ID_IOS: ${GOOGLE_OAUTH_CLIENT_ID_IOS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      RAZORPAY_PLAN_ID_MONTHLY: ${RAZORPAY_PLAN_ID_MONTHLY}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-com.roammate.app}
      APPLE_IAP_PRODUCT_ID_MONTHLY: ${APPLE_IAP_PRODUCT_ID_MONTHLY:-com.roammate.app.plus.monthly}
      APPLE_ISSUER_ID: ${APPLE_ISSUER_ID}
      APPLE_KEY_ID: ${APPLE_KEY_ID}
      APPLE_PRIVATE_KEY_PATH: ${APPLE_PRIVATE_KEY_PATH}
      APPLE_USE_SANDBOX: ${APPLE_USE_SANDBOX:-true}
      FREE_ACTIVE_TRIPS_CAP: ${FREE_ACTIVE_TRIPS_CAP:-2}
      FREE_BRAINSTORM_MONTHLY_CAP: ${FREE_BRAINSTORM_MONTHLY_CAP:-15}
      PLUS_MONTHLY_PRICE_INR: ${PLUS_MONTHLY_PRICE_INR:-149}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      NEXT_PUBLIC_GOOGLE_MAPS_MOCK: ${NEXT_PUBLIC_GOOGLE_MAPS_MOCK:-true}
      NEXT_PUBLIC_GOOGLE_MAPS_FETCH_PHOTOS: ${NEXT_PUBLIC_GOOGLE_MAPS_FETCH_PHOTOS:-true}
      NEXT_PUBLIC_GOOGLE_MAPS_FETCH_RATING: ${NEXT_PUBLIC_GOOGLE_MAPS_FETCH_RATING:-true}
      NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID:-ROAMMATE_MAP_ID}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
