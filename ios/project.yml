name: Roammate
options:
  bundleIdPrefix: com.roammate
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  Roammate:
    type: application
    platform: iOS
    sources:
      - path: Roammate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.roammate.app
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Roammate/App/Info.plist
    info:
      path: Roammate/App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
