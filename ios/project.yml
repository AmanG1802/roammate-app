name: Roammate
options:
  bundleIdPrefix: com.amangupta
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  Roammate:
    type: application
    platform: iOS
    sources:
      - path: Roammate
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amangupta.roammate
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Roammate/App/Info.plist
    info:
      path: Roammate/App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
