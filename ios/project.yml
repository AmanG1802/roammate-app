name: Roammate
options:
  bundleIdPrefix: com.amangupta
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  Roammate:
    type: application
    platform: iOS
    sources:
      - path: Roammate
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amangupta.roammate
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Roammate/App/Info.plist
    info:
      path: Roammate/App/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Google Sign-In. GIDClientID is the iOS OAuth client ID (mirrors
        # GOOGLE_OAUTH_CLIENT_ID_IOS in repo-root .env); the URL scheme is that
        # client ID reversed, for the OAuth callback. Declared here so they
        # survive `xcodegen generate` — do NOT edit these in Info.plist directly.
        GIDClientID: 376477886565-vac1rbim4h61jjbruh19dca1a2lg91uh.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLName: GoogleSignIn
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.376477886565-vac1rbim4h61jjbruh19dca1a2lg91uh
        # Dev Mac LAN IP for physical-device Debug builds. Overwritten each
        # build by the "Inject dev LAN host" phase; empty by default so
        # Config.swift falls back when injection can't run (see Config.swift).
        DevLANHost: ""
    postBuildScripts:
      - path: Scripts/inject-dev-host.sh
        name: Inject dev LAN host
        # Detection is cheap and the IP can change between builds, so always run.
        basedOnDependencyAnalysis: false
